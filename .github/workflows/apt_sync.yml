name: Daily Ubuntu APT Sync
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-apt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: false

      - name: Fetch, Decompress, and Merge Repositories
        run: |
          echo "Downloading official Ubuntu Main and Universe manifests..."
          curl -s http://ports.ubuntu.com/ubuntu-ports/dists/noble/main/binary-arm64/Packages.gz --output Main.gz
          curl -s http://ports.ubuntu.com/ubuntu-ports/dists/noble/universe/binary-arm64/Packages.gz --output Universe.gz
          
          gunzip Main.gz
          gunzip Universe.gz

          echo "Running robust multi-repo Node parser..."
          node -e '
          const fs = require("fs");
          const readline = require("readline");

          async function parseRepo(fileName, repoArray) {
            const fileStream = fs.createReadStream(fileName);
            const rl = readline.createInterface({ input: fileStream, crlfDelay: Infinity });

            let current = {};

            for await (const line of rl) {
              if (line.trim() === "") {
                if (current.package && current.filename) {
                  // OPTIONAL OPTIMIZATION: Filter out debug symbols and development headers 
                  // to keep files fast if you want to prioritize consumer applications
                  const isDevOrDbg = current.package.endsWith("-dev") || current.package.endsWith("-dbg") || current.package.includes("-modules-");
                  if (!isDevOrDbg) {
                    repoArray.push(current);
                  }
                }
                current = {};
                continue;
              }

              if (line.startsWith("Package: ")) current.package = line.replace("Package: ", "").trim();
              else if (line.startsWith("Version: ")) current.version = line.replace("Version: ", "").trim();
              else if (line.startsWith("Section: ")) current.section = line.replace("Section: ", "").trim();
              else if (line.startsWith("Size: ")) current.size = parseInt(line.replace("Size: ", "").trim(), 10) || 0;
              else if (line.startsWith("Filename: ")) current.filename = line.replace("Filename: ", "").trim();
              else if (line.startsWith("Description: ")) {
                current.description = line.replace("Description: ", "").trim();
              } else if (line.startsWith(" ") && current.description !== undefined) {
                current.description += "\n" + line.trim();
              }
            }
            if (current.package && current.filename) repoArray.push(current);
          }

          async function main() {
            let allPackages = [];
            
            console.log("Parsing Main...");
            await parseRepo("Main", allPackages);
            
            console.log("Parsing Universe...");
            await parseRepo("Universe", allPackages);

            fs.writeFileSync("packages.json", JSON.stringify(allPackages));
            console.log(`Successfully compiled ${allPackages.length} application records.`);
          }

          main();
          '
          rm Main Universe

      - name: Push Optimized Matrix to Repository
        run: |
          git config --global user.name "AptDataBot"
          git config --global user.email "bot@ubuntu.explorer"
          git add packages.json
          git commit -m "Automated synchronization of combined APT Main and Universe matrix" || exit 0
          git push
