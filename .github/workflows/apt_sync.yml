name: Daily Ubuntu APT Sync
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-apt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: false

      - name: Fetch, Decompress, and Parse with Node
        run: |
          echo "Downloading official Ubuntu core manifest..."
          curl -s http://ports.ubuntu.com/ubuntu-ports/dists/noble/main/binary-arm64/Packages.gz --output Packages.gz
          gunzip Packages.gz

          echo "Running robust Node parser..."
          node -e '
          const fs = require("fs");
          const readline = require("readline");

          async function parse() {
            const fileStream = fs.createReadStream("Packages");
            const rl = readline.createInterface({ input: fileStream, crlfDelay: Infinity });

            let packages = [];
            let current = {};

            for await (const line of rl) {
              if (line.trim() === "") {
                if (current.package && current.filename) {
                  packages.push(current);
                }
                current = {};
                continue;
              }

              if (line.startsWith("Package: ")) current.package = line.replace("Package: ", "").trim();
              else if (line.startsWith("Version: ")) current.version = line.replace("Version: ", "").trim();
              else if (line.startsWith("Section: ")) current.section = line.replace("Section: ", "").trim();
              else if (line.startsWith("Size: ")) current.size = parseInt(line.replace("Size: ", "").trim(), 10) || 0;
              else if (line.startsWith("Filename: ")) current.filename = line.replace("Filename: ", "").trim();
              else if (line.startsWith("Description: ")) {
                current.description = line.replace("Description: ", "").trim();
              } else if (line.startsWith(" ") && current.description !== undefined) {
                current.description += "\n" + line.trim();
              }
            }
            if (current.package && current.filename) packages.push(current);

            // Save clean, minified, structurally valid JSON
            fs.writeFileSync("packages.json", JSON.stringify(packages));
            console.log(`Successfully compiled ${packages.length} valid package records.`);
          }
          parse();
          '
          rm Packages

      - name: Push Optimized Matrix to Repository
        run: |
          git config --global user.name "AptDataBot"
          git config --global user.email "bot@ubuntu.explorer"
          git add packages.json
          git commit -m "Automated synchronization of official APT package matrix" || exit 0
          git push
